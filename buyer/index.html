<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f9">
<title>Байер · AI-ассистент покупок</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#eef1f6; --line:#e2e6ec;
    --txt:#1a1d23; --muted:#69727f; --accent:#3a6bff; --accent2:#2a55e0;
    --good:#1ba35a; --warn:#d98a00; --bad:#e23744; --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));}
  /* top bar */
  header{position:sticky;top:0;z-index:10;background:rgba(244,246,249,.9);backdrop-filter:blur(10px);
    padding:calc(12px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;}
  header h1{font-size:17px;margin:0;font-weight:650;flex:1}
  header .sub{color:var(--muted);font-size:12px}
  .back{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:6px 0}
  main{flex:1;padding:18px}
  /* bottom nav */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(255,255,255,.97);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);
    display:flex;max-width:560px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);}
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0 12px;
    font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .ic{font-size:20px;line-height:1}
  nav button.on{color:var(--accent)}
  /* generic */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px}
  .card.tap{cursor:pointer;transition:transform .08s,border-color .15s}
  .card.tap:active{transform:scale(.99)}
  .card.tap:hover{border-color:#c3ccd9}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    margin:22px 2px 10px;font-weight:600}
  .muted{color:var(--muted)}
  .row{display:flex;align-items:center;gap:10px}
  .row.sb{justify-content:space-between}
  .tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;
    background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .tag.good{color:var(--good);border-color:rgba(47,191,113,.4)}
  .tag.warn{color:var(--warn);border-color:rgba(245,166,35,.4)}
  .tag.bad{color:var(--bad);border-color:rgba(255,92,102,.4)}
  .tag.accent{color:#cfe0ff;background:rgba(91,140,255,.12);border-color:rgba(91,140,255,.4)}
  label{display:block;font-size:13px;color:var(--muted);margin:14px 2px 6px}
  input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:12px;padding:12px 14px;font:inherit;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{min-height:120px;resize:vertical}
  .ta-wrap{position:relative}
  .ta-wrap textarea{padding-right:54px}
  .micbtn{position:absolute;right:10px;bottom:12px;width:40px;height:40px;border-radius:50%;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:19px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .micbtn:active{transform:scale(.94)}
  .micbtn.rec{background:var(--bad);color:#fff;border-color:var(--bad);animation:pulse 1.2s infinite}
  .btn{display:block;width:100%;text-align:center;border:none;border-radius:14px;
    padding:15px;font:inherit;font-weight:650;cursor:pointer;margin-top:18px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff}
  .btn:active{opacity:.9}
  .btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.ghost{background:none;color:var(--accent);border:1px solid var(--line)}
  .price{font-size:20px;font-weight:700}
  .center{text-align:center}
  .hero{text-align:center;padding:48px 20px 24px}
  .hero .logo{font-size:54px}
  .hero h1{font-size:24px;margin:14px 0 6px}
  .hero p{color:var(--muted);margin:0 auto;max-width:340px}
  .pill{display:inline-flex;gap:6px;align-items:center;background:var(--panel2);
    border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted)}
  .step{display:flex;gap:14px;margin-bottom:18px}
  .step .dot{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;
    justify-content:center;font-size:13px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .step.done .dot{background:var(--good);border-color:var(--good);color:#06210f}
  .step.active .dot{background:var(--accent);border-color:var(--accent);color:#fff;
    animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(91,140,255,.5)}50%{box-shadow:0 0 0 7px rgba(91,140,255,0)}}
  .step .t{font-weight:600}
  .step .d{color:var(--muted);font-size:13px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .ic{font-size:40px;opacity:.6}
  .seg{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:4px;margin-bottom:8px}
  .seg button{flex:1;background:none;border:none;color:var(--muted);padding:8px;border-radius:9px;
    cursor:pointer;font:inherit;font-size:13px}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}
  .rankbadge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;background:var(--panel2);border:1px solid var(--line);flex:none}
  .rankbadge.g1{background:linear-gradient(180deg,#ffd66b,#e6a800);color:#3a2a00;border:none}
  .demo-note{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;opacity:.7}
  /* CRM table */
  .tblwrap{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
  .tblscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.crm{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
  table.crm th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-weight:600;
    text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;
    cursor:pointer;user-select:none;font-size:12px}
  table.crm th.sorted{color:var(--accent)}
  table.crm th .ar{font-size:10px;opacity:.8}
  table.crm td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  table.crm tr:last-child td{border-bottom:none}
  table.crm tr.row1 td{background:rgba(91,140,255,.06)}
  table.crm .nm{font-weight:600;color:var(--txt)}
  table.crm .ad{color:var(--muted);font-size:11px;margin-top:2px;white-space:normal}
  table.crm .pr{font-weight:700;white-space:nowrap}
  table.crm a.tel{color:var(--accent);text-decoration:none;white-space:nowrap}
  table.crm .dot-s{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
  .dot-s.in{background:var(--good)} .dot-s.out{background:var(--bad)}
  /* chat */
  #chatlog{display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
  .bubble{max-width:84%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.4}
  .bubble.ai{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
  .bubble.me{align-self:flex-end;background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:5px}
  .chatbar{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));left:0;right:0;max-width:560px;
    margin:0 auto;display:flex;gap:8px;padding:10px 14px;background:rgba(255,255,255,.96);
    backdrop-filter:blur(10px);border-top:1px solid var(--line)}
  .chatbar textarea{flex:1;min-height:40px;max-height:160px;resize:none;overflow-y:auto;padding:10px 12px;line-height:1.4}
  .chatmic{flex:none;width:46px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);
    color:var(--txt);font-size:18px;cursor:pointer}
  .chatmic.rec{background:var(--bad);color:#fff;border-color:var(--bad);animation:pulse 1.2s infinite}
  .crmbar{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));left:0;right:0;max-width:560px;
    margin:0 auto;padding:10px 14px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
  .crmbar textarea{flex:1;min-height:40px;max-height:160px;resize:none;overflow-y:auto;padding:10px 12px;line-height:1.4}
  .crm-reply{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.35}
  table.crm tr.detail td{background:var(--panel2);font-size:13px;line-height:1.5;white-space:normal;color:var(--txt)}
  table.crm tr[data-exp]{cursor:pointer}
  .chatbar button{flex:none;width:46px;border:none;border-radius:12px;background:var(--accent);color:#fff;
    font-size:18px;cursor:pointer}
  /* live call */
  .bubble.sup{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .bubble.op{align-self:flex-end;background:linear-gradient(180deg,var(--good),#138a48);color:#fff;border-bottom-right-radius:5px}
  .bubble .who{font-size:11px;opacity:.7;margin-bottom:3px;font-weight:600}
  .livebar{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));left:0;right:0;max-width:560px;
    margin:0 auto;display:flex;gap:8px;padding:10px 14px;background:rgba(255,255,255,.96);
    backdrop-filter:blur(10px);border-top:1px solid var(--line)}
  .livebar .btn{margin:0;padding:12px 8px;font-size:13px}
  .rec{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--bad);font-weight:600}
  .rec .blob{width:9px;height:9px;border-radius:50%;background:var(--bad);animation:pulse 1.2s infinite}
  .listening{color:var(--accent)} .listening .blob{background:var(--accent)}
  a{color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <main id="view"></main>
  <nav id="nav"></nav>
</div>

<script>
/* ============================================================
   Buyer Assistant — M0 skeleton (mock data, no backend yet)
   Single-file PWA. Hash router. State in memory + localStorage.
   ============================================================ */

const LS = 'buyer.state.v2';
let state;     // initialized after data + seedTasks are declared (avoids TDZ)

function loadState(){
  const def = {
    settings:{ buyerName:'Алёна Довгаленок', country:'Польша', city:'Trzciana',
               radiusKm:30, assistantLang:'Русский', callLang:'Польский', currency:'PLN',
               openaiKey:'', openaiModel:'gpt-5.4' },
    tasks: seedTasks()
  };
  try{
    const s = JSON.parse(localStorage.getItem(LS));
    if(!s) return def;
    return { ...def, ...s, settings:{ ...def.settings, ...(s.settings||{}) } };  // deep-merge settings so new fields get defaults
  }
  catch(e){ return def; }
}
function saveState(){ localStorage.setItem(LS, JSON.stringify(state)); }

/* ---------- mock data generator (replaced by Claude+search in M2) ---------- */
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function rng(seed){let a=seed>>>0;return ()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const SUP_NAMES=['BudMax Hurt','Castorama','Leroy Merlin','PSB Mrówka','OBI','Bricoman','Hurtownia BudoStal','Mat-Bud','TBM Hurtownia','Centrum Budowlane Krak','SBS Hurt','BAUMAT','PHU Stolbud','Hurtownia Polbud','Składy VOX','Dom-Bud Market','ArcelorBud','MegaBud Hurt','Prof-Bud Kraków','Hurtownia Nowak','BudGigant','Składnica Małopolska','EkoBud Hurt','MaxStore Online','Allegro Biznes','Magbud Hurt','InterBud Skład','GoodBud Hurtownia'];
const SUP_STREETS=['ul. Wielicka 250','al. Pokoju 67','ul. Nowohucka 92','ul. Zakopiańska 58','ul. Igołomska 10','ul. Balicka 116','ul. Półłanki 31','ul. Christo Botewa 4','ul. Kapelanka 14','ul. Bora-Komorowskiego 25','ul. Stella-Sawickiego 9','ul. Conrada 63','ul. Mogilska 80','ul. Pana Tadeusza 6','ul. Wadowicka 8','ul. Rybitwy 12','ul. Tyniecka 110','ul. Opolska 100','ul. Jasnogórska 9','ul. Ptaszyckiego 4'];
const SUP_NOTES_IN=['Доставка 1–2 дня','Самовывоз сегодня','Скидка 5–8% от партии','Есть весь объём на складе','Доставка по городу бесплатно от 1000','Резерв на 48 часов','Отгрузка в день заказа'];
const SUP_NOTES_OUT=['Под заказ, ~3–5 дней','Поставка со склада в Варшаве','Нет нужного объёма, частично','Ожидается поступление через неделю','Только предзаказ'];

function genSuppliers(seedStr, title, basePrice, currency, city){
  const r = rng(hashStr(seedStr+'|'+title));
  const n = 22 + Math.floor(r()*8);              // 22–29 поставщиков
  const item = title.replace(/…$/,'');
  const cityName = city || 'Kraków';
  const out=[];
  const used=new Set();
  for(let i=0;i<n;i++){
    let ni = Math.floor(r()*SUP_NAMES.length);
    while(used.has(ni) && used.size<SUP_NAMES.length){ ni=(ni+1)%SUP_NAMES.length; }
    used.add(ni);
    const nameBase = SUP_NAMES[ni];
    const name = used.size>SUP_NAMES.length? nameBase+' '+(i+1) : nameBase;
    const inStock = r()>0.32;
    const price = +(basePrice*(0.82+r()*0.46)).toFixed(2);
    const rating = +(3.5+r()*1.5).toFixed(1);
    const reviews = 8+Math.floor(r()*2400);
    const street = SUP_STREETS[i%SUP_STREETS.length];
    const slug = nameBase.toLowerCase().replace(/[^a-z]+/g,'')||'shop';
    out.push({
      id:'s'+i, name,
      phone:'+48 12 '+(300+Math.floor(r()*699))+' '+(10+Math.floor(r()*89))+' '+(10+Math.floor(r()*89)),
      addr: street+', '+ cityName,
      website: slug+'.pl', price, currency, inStock, rating, reviews,
      source: slug+'.pl',
      notes:(inStock?SUP_NOTES_IN:SUP_NOTES_OUT)[Math.floor(r()*(inStock?SUP_NOTES_IN.length:SUP_NOTES_OUT.length))],
    });
  }
  return out;
}
function supScore(s){ return (s.inStock?100:0) - (s.price??9999) + (s.rating??0)*8; }
function buildReport(t){
  const ranked=[...t.suppliers].sort((a,b)=>supScore(b)-supScore(a));
  const top=ranked.slice(0,3);
  const inStockN=t.suppliers.filter(s=>s.inStock).length;
  const prices=t.suppliers.map(s=>s.price).filter(p=>typeof p==='number');
  const cur=t.suppliers[0]?.currency||'';
  const range=prices.length? `Разброс цен ${Math.min(...prices)}–${Math.max(...prices)} ${cur}. ` : 'У части поставщиков цену уточняем звонком. ';
  const best=top[0];
  const prevSummary=t.report?.summary||'';
  return {
    summary: prevSummary && t.report?._ai
      ? prevSummary  // keep AI summary if already generated
      : `Проверила ${t.suppliers.length} поставщиков в регионе, из них ${inStockN} с товаром в наличии. ${range}Лучший баланс цены, наличия и рейтинга — «${best?.name||'—'}»${best&&best.price!=null?` (${best.price} ${cur})`:''}. Ниже — топ-3; полный список и фильтры в CRM.`,
    ranking: ranked.slice(0,5).map(s=>s.id),
    _ai: t.report?._ai||false,
    negotiate: t.report?.negotiate||null,
  };
}
async function buildAiReport(t){
  const s=state.settings;
  if(!s.openaiKey) return buildReport(t);
  const prices=t.suppliers.map(x=>x.price).filter(p=>p!=null);
  const supList=t.suppliers.slice(0,20).map(x=>
    `- ${x.name} | ${x.addr||'?'} | ${x.price!=null?x.price+' '+(x.currency||''):'цена ?'} | ${x.inStock===true?'есть':x.inStock===false?'нет':'уточнить'} | ${x.phone||'—'} | ${x.notes||''}`
  ).join('\n');
  const res=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},
    body:JSON.stringify({model:'gpt-4o-mini',max_tokens:600,
      messages:[{role:'user',content:
`Ты — ассистент-байер. Задача покупателя: "${t.brief||t.title}"
Регион: ${s.city}, ${s.country||'Poland'}. Валюта: ${s.currency}.

Вот список поставщиков из CRM (${t.suppliers.length} шт.):
${supList}

Верни JSON без markdown:
{
  "summary": "2-3 фразы по-русски: итог — сколько нашли, ценовой диапазон (${prices.length?Math.min(...prices)+'–'+Math.max(...prices)+' '+s.currency:'цены уточняем'}), кто лучший вариант и почему",
  "ranking": [список из топ-5 id или названий поставщиков в порядке рекомендации],
  "negotiate": [
    "тактический хинт 1 как поторговаться (конкретный, основан на данных CRM)",
    "хинт 2",
    "хинт 3"
  ]
}`}]
    })
  });
  const d=await res.json();
  if(!res.ok) return buildReport(t);
  let obj; try{ obj=JSON.parse(d.choices[0].message.content); } catch{ return buildReport(t); }
  // map ranking names back to ids
  const byName=Object.fromEntries(t.suppliers.map(x=>[x.name.toLowerCase().trim(),x.id]));
  const ranked=[...t.suppliers].sort((a,b)=>supScore(b)-supScore(a));
  const rankIds=(obj.ranking||[]).map(r=>{
    const id=byName[String(r).toLowerCase().trim()];
    return id||r;
  }).filter(r=>t.suppliers.find(x=>x.id===r)).slice(0,5);
  if(rankIds.length<3) rankIds.push(...ranked.map(x=>x.id).filter(id=>!rankIds.includes(id)).slice(0,5-rankIds.length));
  return { summary:obj.summary||buildReport(t).summary, ranking:rankIds, _ai:true, negotiate:obj.negotiate||[] };
}

/* ---------- REAL research via OpenAI Responses API + web search ---------- */
function num(x){ if(typeof x==='number') return x; const n=parseFloat(String(x).replace(',','.').replace(/[^\d.]/g,'')); return isNaN(n)?null:n; }
function extractText(data){
  if(typeof data.output_text==='string' && data.output_text) return data.output_text;
  let out='';
  (data.output||[]).forEach(it=>(it.content||[]).forEach(c=>{ if((c.type==='output_text'||c.type==='text')&&c.text) out+=c.text; }));
  return out;
}
function parseJSONLoose(text){
  let s=(text||'').trim().replace(/^```(?:json)?/i,'').replace(/```$/,'').trim();
  const a=s.indexOf('['), b=s.lastIndexOf(']');
  if(a>=0&&b>a) s=s.slice(a,b+1);
  return JSON.parse(s);
}
function normalizeSupplier(o,i,cur){
  return {
    id:'s'+i,
    name:(o.name||o.title||'—').toString(),
    phone:(o.phone||o.telephone||'').toString(),
    addr:(o.address||o.addr||'').toString(),
    website:(o.website||'').toString().replace(/^https?:\/\//,'').replace(/\/$/,''),
    price:num(o.price),
    currency:(o.currency||cur||'').toString(),
    inStock: o.inStock===true||o.in_stock===true ? true : (o.inStock===false||o.in_stock===false ? false : null),
    rating:num(o.rating),
    reviews:num(o.reviews)||0,
    distanceKm:num(o.distance_km),
    why:(o.why||o.reason||'').toString(),
    notes:(o.notes||'').toString(),
    sourceUrl:(o.source_url||o.source||(o.website?('https://'+o.website.replace(/^https?:\/\//,'')):'')).toString(),
    source:(o.source_url||o.source||o.website||'').toString().replace(/^https?:\/\//,'').replace(/\/.*$/,''),
  };
}
function dedupeSuppliers(arr){
  const seen=new Set(), out=[];
  for(const s of arr){
    const keys=[
      (s.phone||'').replace(/\D/g,''),
      (s.sourceUrl||'').toLowerCase().replace(/[?#].*/,''),
      (s.website||'').toLowerCase().replace(/\/$/,''),
      s.name.toLowerCase().trim()
    ].filter(Boolean);
    if(keys.some(k=>seen.has(k))) continue;
    keys.forEach(k=>seen.add(k));
    out.push(s);
  }
  return out.map((s,i)=>({...s,id:'s'+i}));
}
async function openaiResearch(t){
  const s=state.settings;
  const radius = s.radiusKm||30;
  const prompt=
`Ты — ассистент-байер. Через ВЕБ-ПОИСК найди реальных поставщиков/магазины, где можно КУПИТЬ то, что нужно покупателю, МАКСИМАЛЬНО БЛИЗКО к его локации.

ЛОКАЦИЯ ПОКУПАТЕЛЯ: ${s.city}${s.country?', '+s.country:''}. Радиус поиска: примерно ${radius} км вокруг ${s.city}.
Валюта по умолчанию: ${s.currency}.
ЗАДАЧА: "${t.brief}".

ЖЁСТКИЕ ПРАВИЛА:
1. Сначала ищи в самом ${s.city} и в ближайших населённых пунктах (в радиусе ${radius} км). Сортируй результаты ОТ БЛИЖАЙШЕГО к дальнему. Не предлагай поставщиков из других регионов/далёких городов, если есть ближе.
2. Только РЕАЛЬНЫЕ компании, найденные через веб-поиск, у каждой должен быть рабочий "source_url" (страница, где ты взял данные). Если не можешь подтвердить телефон/адрес/источник — НЕ включай. Лучше 8 реальных и близких, чем 25 случайных.
3. НЕ дублируй: одна компания = одна запись (объединяй филиалы).
4. Ничего не выдумывай: нет данных — ставь null.

Верни СТРОГО JSON-массив без markdown. Поля объекта:
{"name","phone","address","website","distance_km"(число, прим. расстояние от ${s.city} или null),"price"(за единицу или null),"currency","inStock"(true/false/null),"rating"(0-5 или null),"reviews"(число или null),"why"(1 фраза по-русски: ПОЧЕМУ этот контакт релевантен — что продаёт/насколько близко),"notes"(кратко по-русски: наличие/доставка/условия),"source_url"(рабочая ссылка-подтверждение)}.`;
  const body={ model:s.openaiModel||'gpt-5.4', input:prompt };
  if(/^(gpt-5|o\d)/.test(body.model)) body.reasoning={ effort:'high' };   // deeper search for reasoning models
  // try modern then legacy web-search tool type
  async function call(toolType){
    const b = toolType ? {...body, tools:[{type:toolType}]} : body;
    return fetch('https://api.openai.com/v1/responses',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},
      body:JSON.stringify(b)
    });
  }
  let res=await call('web_search');
  if(!res.ok){
    const txt=await res.text();
    if(/web_search|tool|not supported|invalid/i.test(txt)) { res=await call('web_search_preview'); }
    else throw new Error(`OpenAI ${res.status}: ${txt.slice(0,300)}`);
  }
  if(!res.ok){ const txt=await res.text(); res=await call(null); if(!res.ok){ throw new Error(`OpenAI ${res.status}: ${(await res.text()).slice(0,300)}`);} }
  const data=await res.json();
  const arr=parseJSONLoose(extractText(data));
  if(!Array.isArray(arr)||!arr.length) throw new Error('Модель не вернула список поставщиков.');
  const mapped = arr.map((o,i)=>normalizeSupplier(o,i,s.currency));
  return dedupeSuppliers(mapped).sort((a,b)=>(a.distanceKm??1e9)-(b.distanceKm??1e9));
}

const SPEECH_LANG = {'Русский':'ru-RU','Английский':'en-US','Польский':'pl-PL','Украинский':'uk-UA','Немецкий':'de-DE','Испанский':'es-ES'};
let recog=null, recBase='';
function toggleDictation(targetId='brief', btnId='micbtn', noteId='micnote'){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn=document.getElementById(btnId);
  const note=noteId?document.getElementById(noteId):null;
  const setNote=t=>{ if(note) note.textContent=t; };
  if(!SR){ setNote('⚠️ Голосовой ввод не поддерживается этим браузером. Лучше всего работает в Chrome или Safari.'); return; }
  if(recog){ recog.stop(); return; }   // toggle off
  const ta=document.getElementById(targetId);
  recBase = (ta.value||'').trim();
  recog = new SR();
  recog.lang = SPEECH_LANG[state.settings.assistantLang] || 'ru-RU';
  recog.continuous = true; recog.interimResults = true;
  recog.onstart = ()=>{ if(btn) btn.classList.add('rec'); setNote('🔴 Слушаю… нажми микрофон ещё раз, чтобы остановить.'); };
  recog.onerror = e=>{ setNote(e.error==='not-allowed' ? '⚠️ Нет доступа к микрофону — разреши его в браузере.' : '⚠️ Ошибка распознавания: '+e.error); };
  recog.onresult = e=>{
    let txt='';
    for(let i=0;i<e.results.length;i++) txt += e.results[i][0].transcript;
    ta.value = (recBase ? recBase+' ' : '') + txt;
  };
  recog.onend = ()=>{ if(btn) btn.classList.remove('rec'); setNote('✓ Готово.'); recog=null; };
  recog.start();
}

`Задача покупателя — голосовой поток:

Верни JSON: {"title":"краткое название до 7 слов (товар + ключевые параметры)","brief":"чистая структурированная версия задачи на русском: что купить, сколько, параметры, регион, бюджет, дополнительно (сушка и т.п.)"}

        ${!done?`<div class="muted" style="font-size:12px;margin-top:6px">${realRunning?(state.settings.openaiModel||'gpt-5.4')+' · web search · обычно 20–60 сек':'источник: '+sources[Math.min(cur,sources.length-1)]}</div>`:''}
      </div>
      <div class="card">${steps.map((s,i)=>{
        const cls = done?'done':(i<cur?'done':i===cur?'active':'');
        return `<div class="step ${cls}"><div class="dot">${(done||i<cur)?'✓':i+1}</div>
          <div><div class="t">${s[0]}</div><div class="d">${s[1]}</div></div></div>`;}).join('')}</div>
      ${done?`<button class="btn" onclick="go('crm/${t.id}')">Открыть CRM (${t.suppliers.length}) →</button>
        <button class="btn ghost" onclick="go('chat/${t.id}')">💬 Уточнить поиск в чате</button>`:
        `<div class="center muted">${useReal?'Реальный поиск: OpenAI + web search':'Демо-режим. Задай OpenAI-ключ в настройках для реального поиска.'}</div>`}`;
  }
  draw();
  if(t.status==='researching' && !t.researchError){
    if(useReal){
      const iv=setInterval(()=>{ if(parseHash().name!=='research'||t.status!=='researching'){clearInterval(iv);return;} cur=(cur+1)%steps.length; draw(); },1100);
      if(!t._searching){
        t._searching=true;
        openaiResearch(t).then(sup=>{
          t.suppliers=sup; t.report=buildReport(t); t.status='reported'; delete t.researchError;
        }).catch(e=>{ t.researchError=String(e&&e.message||e); })
        .finally(()=>{ t._searching=false; clearInterval(iv); saveState(); if(parseHash().name==='research') renderResearch(t.id); });
      }
    } else {
      const iv = setInterval(()=>{
        cur++;
        if(cur>=steps.length){
          clearInterval(iv);
          if(!t.suppliers.length){ t.suppliers = genSuppliers(t.id, t.title, 39, state.settings.currency, state.settings.city); t.report = buildReport(t); }
          t.status='reported'; saveState();
        }
        if(parseHash().name==='research'){ draw(); } else { clearInterval(iv); }
      }, 850);
    }
  } else if(t.status==='reported'){ cur = steps.length; draw(); }
}
function retryResearch(id){
  const t=findTask(id); if(!t) return;
  delete t.researchError; t._searching=false; t.suppliers=[]; t.status='researching'; saveState();
  renderResearch(id);
}

  const cmp = {

    price:(a,b)=>(a.price??1e9)-(b.price??1e9),
    stock:(a,b)=>((b.inStock?1:0)-(a.inStock?1:0)),

  function apply(arr){

      `<td>${s.phone? `<a class="tel" data-stop href="tel:${s.phone.replace(/\s/g,'')}">${s.phone}</a>` : '<span class="muted">—</span>'}</td>`,

      detail = `<tr class="detail"><td colspan="${colspan}">

        : `<div class="tblwrap"><div class="tblscroll"><table class="crm">
        <thead><tr>${cols.map(([k,l])=>
          `<th data-k="${k}" class="${sort===k?'sorted':''}">${l}${

        <tbody>${list.map((s,i)=>rowFor(s,i)).join('')}</tbody>

      ${taskMode?`<div id="inline-script" style="margin-top:16px"></div>`:''}
      <div style="height:96px"></div>
      <div class="crmbar">
        ${lastReply?`<div class="crm-reply">🤖 ${lastReply}</div>`:''}
        <div class="row" style="gap:8px">
          <button class="chatmic" id="crmmic" onclick="toggleDictation('crmin','crmmic',null)" title="Диктовать">🎤</button>
          <textarea id="crmin" placeholder="Вставь ссылку, «до 40», «в наличии», «добавь Название, +48…» · Alt+Enter — новая строка" rows="1" autocomplete="off"></textarea>
          <button id="crmsend" style="flex:none;width:46px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;align-self:flex-end">▶</button>

      </div>`;
    v.querySelectorAll('th').forEach(th=>th.onclick=()=>{

    v.querySelectorAll('tr[data-exp]').forEach(tr=>tr.onclick=e=>{

    v.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=e=>{
      e.stopPropagation();

      if(!confirm(`Удалить «${sup?sup.name:''}» из CRM?`)) return;

    v.querySelectorAll('.edit-fld').forEach(inp=>{
      inp.onchange=()=>{
        const sup=t.suppliers.find(x=>x.id===inp.dataset.sid); if(!sup) return;

        if(k==='price'){ val=val===''?null:parseFloat(val.replace(',','.')); if(isNaN(val)) val=null; }

    });
    const inp=document.getElementById('crmin');
    inp.value=inputVal;
    const grow=el=>{ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; };
    inp.oninput=e=>{ inputVal=e.target.value; grow(inp); };
    inp.onkeydown=e=>{
      if(e.key==='Enter'&&!e.altKey&&!e.shiftKey){ e.preventDefault(); submit(); }
    };
    document.getElementById('crmsend').onclick=submit;

  function crmToggle(toMap){ mapView=toMap; draw(); }
  async function submit(){
    if(busy) return;
    const inp=document.getElementById('crmin');
    const text=((inp&&inp.value)||inputVal||'').trim(); if(!text) return;
    if(inp) inp.value=''; inputVal='';
    t.chat=t.chat||[];
    t.chat.push({role:'me',text});
    // URL anywhere in text → fetch and parse page into CRM contact
    const urlM=text.match(/(https?:\/\/[^\s]+)/i);
    busy=true;
    if(urlM){
      const url=urlM[1].replace(/[.,;)]+$/,''); // trim trailing punctuation
      lastReply='⏳ Открываю страницу и извлекаю данные…';
      t.chat.push({role:'ai',text:lastReply});
      saveState(); draw();
      try{
        const sup=await fetchSupplierFromUrl(url);
        t.suppliers.unshift(sup);
        t.chat.pop();
        lastReply=`Добавила: «${sup.name}»${sup.price!=null?` · ${sup.price} ${sup.currency}`:''}${sup.phone?` · ${sup.phone}`:''}. Всего ${t.suppliers.length}.`;
        t.chat.push({role:'ai',text:lastReply});
      } catch(e){
        t.chat.pop();
        lastReply=`Не удалось загрузить страницу: ${e.message||e}`;
        t.chat.push({role:'ai',text:lastReply});
      }
      if(t.report) t.report=buildReport(t);
      busy=false; saveState(); draw();
      return;
    }
    // Search command → re-run research (optionally with extra query)
    if(/^\s*(найди|поищи|ищи|исследуй|search|find|ещё|добавь ещё|добавь еще|ещё поставщик|покажи ещё)/i.test(text)){
      if(!state.settings.openaiKey){
        lastReply='Добавь ключ OpenAI в настройках — без него поиск недоступен.';
        t.chat.push({role:'ai',text:lastReply}); busy=false; saveState(); draw(); return;
      }
      const extra=text.replace(/^\s*(найди|поищи|ищи|исследуй|search|find|ещё|добавь ещё|добавь еще|ещё поставщик|покажи ещё)\s*/i,'').trim();
      const briefOrig=t.brief||t.title;
      if(extra) t.brief=briefOrig+'\nДополнительно: '+extra;
      lastReply='🔍 Ищу…';
      t.chat.push({role:'ai',text:lastReply}); saveState(); draw();
      try{
        const newSuppliers=await openaiResearch(t);
        t.brief=briefOrig;
        const before=t.suppliers.length;
        t.suppliers=dedupeSuppliers([...t.suppliers,...newSuppliers]);
        t.chat.pop();
        lastReply=`Нашла ${t.suppliers.length-before>0?t.suppliers.length-before:'0 новых'} поставщиков. Всего в CRM: ${t.suppliers.length}.`;
        t.chat.push({role:'ai',text:lastReply});
        if(t.report) t.report=buildReport(t);
      } catch(e){
        t.brief=briefOrig; t.chat.pop();
        lastReply=`Ошибка поиска: ${e.message||e}`;
        t.chat.push({role:'ai',text:lastReply});
      }
      busy=false; saveState(); draw(); return;
    }
    // Long/multiline text with phone numbers → extract contacts with LLM
    const hasPhones=text.match(/\+?\d[\d\s\-]{7,}\d/g)||[];
    const isBlock=text.includes('\n')||text.length>120||hasPhones.length>=1;
    if(isBlock && state.settings.openaiKey){
      lastReply='📋 Извлекаю контакты из текста…';
      t.chat.push({role:'ai',text:lastReply}); saveState(); draw();
      try{
        const extracted=await extractContactsFromText(text);
        t.chat.pop();
        if(extracted.length){
          const before=t.suppliers.length;
          t.suppliers=dedupeSuppliers([...extracted,...t.suppliers]);
          const added=t.suppliers.length-before;
          lastReply=`Извлекла ${added} контакт${added===1?'':'а'} из текста. Всего в CRM: ${t.suppliers.length}.`;
          if(t.report) t.report=buildReport(t);
        } else {
          lastReply='Не нашла контактов в этом тексте. Попробуй фильтр: «только в наличии», «до 40».';
        }
        t.chat.push({role:'ai',text:lastReply});
      } catch(e){
        t.chat.pop();
        lastReply=`Ошибка: ${e.message||e}`;
        t.chat.push({role:'ai',text:lastReply});
      }
      busy=false; saveState(); draw(); return;
    }
    busy=false;
    lastReply=applyRefine(t,text);
    if(lastReply) t.chat.push({role:'ai',text:lastReply});
    if(t.report) t.report=buildReport(t);
    saveState(); draw();
  }
  draw();
  if(taskMode) renderInlineScript(t);
}

/* ---------- CRM map (Leaflet + OSM + Nominatim geocoding) ---------- */
let _leafletReady=null;
function loadLeaflet(){
  if(_leafletReady) return _leafletReady;
  _leafletReady=new Promise(res=>{
    if(window.L){ res(); return; }
    const lnk=document.createElement('link');
    lnk.rel='stylesheet'; lnk.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(lnk);
    const s=document.createElement('script');
    s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s.onload=res; document.head.appendChild(s);
  });
  return _leafletReady;
}
let _crmMap=null;
async function initCrmMap(list, t){
  await loadLeaflet();
  const el=document.getElementById('crmmap'); if(!el) return;
  const city=state.settings.city||'Poland';
  // geocode city center once
  if(!t._mapCenter){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`,{headers:{'Accept-Language':'ru'}});
      const d=await r.json();
      if(d[0]) t._mapCenter=[+d[0].lat,+d[0].lon];
    } catch(e){}
  }
  const center=t._mapCenter||[50.06,19.94];
  if(_crmMap){ _crmMap.remove(); _crmMap=null; }
  const map=L.map(el).setView(center,10);
  _crmMap=map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a>',maxZoom:19}).addTo(map);
  // star marker for city center
  L.marker(center,{icon:L.divIcon({className:'',html:'<div style="font-size:22px;line-height:1">📍</div>',iconAnchor:[11,22]})})
    .addTo(map).bindPopup(`<b>${city}</b>`);
  // geocode and pin suppliers
  const bounds=[center];
  for(const s of list){
    if(!s._lat&&s.addr){
      try{
        await new Promise(r=>setTimeout(r,300)); // Nominatim rate-limit: 1 req/s
        const q=`${s.addr}, ${city}, Poland`;
        const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{'Accept-Language':'ru'}});
        const d=await r.json();
        if(d[0]){ s._lat=+d[0].lat; s._lng=+d[0].lon; }
      } catch(e){}
    }
    if(s._lat){
      bounds.push([s._lat,s._lng]);
      const color=s.inStock===true?'#1ba35a':s.inStock===false?'#e23744':'#888';
      const icon=L.divIcon({className:'',iconAnchor:[12,12],html:
        `<div style="width:24px;height:24px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">${s.price!=null?'₽':''}</div>`});
      L.marker([s._lat,s._lng],{icon}).addTo(map).bindPopup(
        `<b>${s.name}</b>${s.addr?`<br>📍 ${s.addr}`:''}${s.price!=null?`<br>💰 ${s.price} ${s.currency}`:''}${s.phone?`<br>📞 <a href="tel:${s.phone.replace(/\s/g,'')}">${s.phone}</a>`:''}`
      );
      if(document.getElementById('crmmap')) map.fitBounds(bounds,{padding:[30,30]});
    }
  }
  saveState();
}
function stars(r){ if(r==null) return ''; const n=Math.round(r); return '★'.repeat(n)+'☆'.repeat(Math.max(0,5-n)); }
function stockCell(v){
  if(v===true) return `<span class="dot-s in"></span>есть`;
  if(v===false) return `<span class="dot-s out"></span>под заказ`;
  return `<span class="dot-s" style="background:var(--muted)"></span>уточнить`;
}

async function refreshReport(id){
  const t=findTask(id); if(!t) return;
  const btn=document.getElementById('regen-btn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Генерирую…'; }
  t.report=await buildAiReport(t);
  saveState();
  // re-render whatever screen is currently showing the task
  const h=parseHash();
  if(h.name==='task') renderCRM(id, true);
  else renderCRM(id);
}

function renderChat(id){
  const t = findTask(id);
  if(!t){ go('home'); return; }
  t.chat = t.chat || [];
  if(!t.chat.length){
    t.chat.push({role:'ai', text:`Нашла ${t.suppliers.length} поставщиков по «${t.title}». Фильтры: «только в наличии», «до 40», «рейтинг от 4.3», «не дальше 20 км», «сбросить». Добавить контакт: вставь ссылку (OLX, сайт) или «добавь Название, +48 12 345 67 89, сайт.pl».`});
  }
  setHeader('Уточнение поиска', t.title, 'crm/'+id);
  const v = document.getElementById('view');
  function draw(){
    v.innerHTML = `
      <div id="chatlog">${t.chat.map(m=>
        `<div class="bubble ${m.role}">${m.text}</div>`).join('')}</div>
      <div class="chatbar">
        <button id="chatmic" class="chatmic" onclick="toggleDictation('chatin','chatmic',null)" title="Диктовать голосом">🎤</button>
        <textarea id="chatin" placeholder="«найди ещё», «только в наличии», «до 40 PLN», ссылка… · Alt+Enter — новая строка" rows="1" autocomplete="off"></textarea>
        <button onclick="sendChat('${id}')" style="align-self:flex-end">▶</button>
      </div>`;
    const log=document.getElementById('chatlog'); log.scrollTop=log.scrollHeight;
    const inp=document.getElementById('chatin');
    inp.focus();
    const grow=el=>{ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; };
    inp.oninput=()=>grow(inp);
    inp.onkeydown=e=>{
      if(e.key==='Enter'&&!e.altKey&&!e.shiftKey){ e.preventDefault(); sendChat(id); }
    };
  }
  renderChat._draw=draw;
  draw();
}
async function sendChat(id){
  const t=findTask(id); if(!t) return;
  const inp=document.getElementById('chatin'); const text=inp.value.trim();
  if(!text) return;
  t.chat.push({role:'me', text});
  inp.value=''; inp.style.height='auto';
  // URL → parse page
  const urlM=text.match(/(https?:\/\/[^\s]+)/i);
  if(urlM){
    const url=urlM[1].replace(/[.,;)]+$/,'');
    t.chat.push({role:'ai',text:'⏳ Открываю страницу…'});
    saveState(); renderChat._draw&&renderChat._draw();
    try{
      const sup=await fetchSupplierFromUrl(url);
      t.suppliers.unshift(sup); t.chat.pop();
      t.chat.push({role:'ai',text:`Добавила: «${sup.name}»${sup.price!=null?` · ${sup.price} ${sup.currency}`:''}${sup.phone?` · ${sup.phone}`:''}.`});
    } catch(e){ t.chat.pop(); t.chat.push({role:'ai',text:`Ошибка: ${e.message||e}`}); }
    if(t.report) t.report=buildReport(t); saveState(); renderChat._draw&&renderChat._draw(); return;
  }
  // Search command → re-run research
  if(/^\s*(найди|поищи|ищи|исследуй|search|find|ещё|добавь ещё|добавь еще|покажи ещё)/i.test(text)){
    if(!state.settings.openaiKey){
      t.chat.push({role:'ai',text:'Добавь ключ OpenAI в настройках — без него поиск недоступен.'});
      saveState(); renderChat._draw&&renderChat._draw(); return;
    }
    const extra=text.replace(/^\s*(найди|поищи|ищи|исследуй|search|find|ещё|добавь ещё|добавь еще|покажи ещё)\s*/i,'').trim();
    const briefOrig=t.brief||t.title;
    if(extra) t.brief=briefOrig+'\nДополнительно: '+extra;
    t.chat.push({role:'ai',text:'🔍 Ищу…'});
    saveState(); renderChat._draw&&renderChat._draw();
    try{
      const newSuppliers=await openaiResearch(t);
      t.brief=briefOrig;
      const before=t.suppliers.length;
      t.suppliers=dedupeSuppliers([...t.suppliers,...newSuppliers]);
      t.chat.pop();
      t.chat.push({role:'ai',text:`Нашла ещё ${t.suppliers.length-before>0?t.suppliers.length-before:'0 новых'} поставщиков. Всего: ${t.suppliers.length}.`});
      if(t.report) t.report=buildReport(t);
    } catch(e){ t.brief=briefOrig; t.chat.pop(); t.chat.push({role:'ai',text:`Ошибка поиска: ${e.message||e}`}); }
    saveState(); renderChat._draw&&renderChat._draw(); return;
  }
  // Long/multiline text → extract contacts
  const hasPhones2=text.match(/\+?\d[\d\s\-]{7,}\d/g)||[];
  if((text.includes('\n')||text.length>120||hasPhones2.length>=1) && state.settings.openaiKey){
    t.chat.push({role:'ai',text:'📋 Извлекаю контакты из текста…'});
    saveState(); renderChat._draw&&renderChat._draw();
    try{
      const extracted=await extractContactsFromText(text);
      t.chat.pop();
      if(extracted.length){
        const before=t.suppliers.length;
        t.suppliers=dedupeSuppliers([...extracted,...t.suppliers]);
        const added=t.suppliers.length-before;
        t.chat.push({role:'ai',text:`Извлекла ${added} контакт${added===1?'':'а'} из текста. Всего в CRM: ${t.suppliers.length}.`});
        if(t.report) t.report=buildReport(t);
      } else {
        t.chat.push({role:'ai',text:'Контактов в тексте не нашла.'});
      }
    } catch(e){ t.chat.pop(); t.chat.push({role:'ai',text:`Ошибка: ${e.message||e}`}); }
    saveState(); renderChat._draw&&renderChat._draw(); return;
  }
  const reply=applyRefine(t, text);
  if(reply) t.chat.push({role:'ai', text:reply});
  if(t.report) t.report=buildReport(t);
  saveState();
  renderChat._draw && renderChat._draw();
}
async function extractContactsFromText(text){
  const s=state.settings;
  const res=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},
    body:JSON.stringify({
      model:'gpt-4o-mini', max_tokens:800,
      response_format:{type:'json_object'},
      messages:[{role:'user',content:
`Из текста извлеки список поставщиков/контактов. Верни JSON: {"contacts":[{"name","phone","address","website","price":null,"currency":null,"inStock":null,"why","notes","source_url":""}]}.
Нет данных — ставь null. Каждый уникальный бизнес — отдельная запись. В поле why — 1 фраза по-русски что это за контакт.

Текст:
${text}`}]
    })
  });
  const d=await res.json();
  if(!res.ok) throw new Error(d.error?.message||'OpenAI error');
  let parsed;
  try{ parsed=JSON.parse(d.choices[0].message.content); } catch{ parsed={contacts:[]}; }
  const arr=parsed.contacts||parsed.suppliers||parsed||[];
  if(!Array.isArray(arr)) return [];
  return arr.filter(o=>o.name).map((o,i)=>normalizeSupplier({...o,source_url:o.source_url||''},Date.now()+i,s.currency));
}
async function fetchSupplierFromUrl(url){
  const s=state.settings;
  const domain=new URL(url).hostname.replace(/^www\./,'');
  // Preferred path: let the model OPEN the page via web_search and extract structured data.
  // Robust for JS-heavy sites (OLX, Allegro) where a raw CORS-proxy fetch returns an empty shell.
  if(s.openaiKey){
    const prompt=
`Открой эту страницу объявления/товара и извлеки данные продавца. Используй веб-поиск, чтобы зайти на саму страницу.

URL: ${url}

Верни СТРОГО ОДИН JSON-объект без markdown, со всеми полями (нет данных — ставь null):
{"name"(название продавца/компании или заголовок объявления),"phone"(телефон если показан),"address"(город/адрес),"website","price"(число за единицу),"currency","inStock"(true/false/null),"rating"(0-5/null),"reviews"(число/null),"why"(1 фраза по-русски: что это за предложение),"notes"(по-русски: краткое описание товара, состояние, условия, доставка),"source_url"(=${url})}.`;
    const body={ model:s.openaiModel||'gpt-5.4', input:prompt };
    if(/^(gpt-5|o\d)/.test(body.model)) body.reasoning={ effort:'medium' };
    const callOpenAI=(toolType)=>fetch('https://api.openai.com/v1/responses',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},
      body:JSON.stringify(toolType?{...body,tools:[{type:toolType}]}:body)
    });
    let res=await callOpenAI('web_search');
    if(!res.ok){
      const txt=await res.text();
      if(/web_search|tool|not supported|invalid/i.test(txt)) res=await callOpenAI('web_search_preview');
      else throw new Error(`OpenAI ${res.status}: ${txt.slice(0,200)}`);
    }
    if(!res.ok) throw new Error(`OpenAI ${res.status}: ${(await res.text()).slice(0,200)}`);
    const data=await res.json();
    let obj=parseJSONLoose(extractText(data));
    if(Array.isArray(obj)) obj=obj[0];
    if(!obj||typeof obj!=='object') throw new Error('модель не вернула данные');
    const sup=normalizeSupplier({...obj, source_url:obj.source_url||url}, Date.now(), s.currency);
    if(!sup.name||sup.name==='—') sup.name=domain;
    if(!sup.website) sup.website=domain;
    if(!sup.why) sup.why='Добавлено по ссылке';
    sup.id='s'+Date.now();
    return sup;
  }
  // Fallback without key: fetch via CORS proxy and pull meta tags + regex.
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const r=await fetch(proxy);
  if(!r.ok) throw new Error('добавь ключ OpenAI в настройках для разбора ссылок');
  const d=await r.json();
  const html=d.contents||'';
  const meta=(p)=>{ const m=html.match(new RegExp(`<meta[^>]+(?:property|name)=["']${p}["'][^>]+content=["']([^"']+)`,'i')); return m?m[1].trim():''; };
  const titleM=html.match(/<title[^>]*>([^<]+)<\/title>/i);
  const name=(meta('og:title')||(titleM?titleM[1]:'')||domain).replace(/\s*[-|·•].*$/,'').trim();
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  const text=(tmp.textContent||'').replace(/\s+/g,' ').trim();
  const phM=text.match(/(\+?48[\s\-]?\d{3}[\s\-]?\d{3}[\s\-]?\d{3}|\d{3}[\s\-]?\d{3}[\s\-]?\d{3})/);
  const prM=(meta('product:price:amount')||text).match(/(\d[\d\s,.]*\d|\d)\s*(PLN|zł|EUR|€|USD|\$)?/i);
  return{id:'s'+Date.now(),name,phone:phM?phM[1]:'',addr:'',website:domain,
    price:prM?parseFloat(prM[1].replace(/\s/g,'').replace(',','.')):null,
    currency:(meta('product:price:currency')||s.currency),
    inStock:/dostępn|в наличии|есть/i.test(text)?true:null,rating:null,reviews:0,distanceKm:null,
    why:'Добавлено по ссылке',notes:(meta('og:description')||'').slice(0,200),sourceUrl:url,source:domain};
}
function applyRefine(t, text){
  t.filters=t.filters||{};
  // --- ADD a contact to CRM: "добавь <название> <телефон> <сайт>" ---
  if(/^\s*(добав|внеси|добавь|add)/i.test(text)){
    const rest=text.replace(/^\s*(добав\w*|внеси|add\w*)\s*/i,'').trim();
    const phone=(rest.match(/(\+?\d[\d\s\-()]{6,}\d)/)||[])[1]||'';
    const url=(rest.match(/([a-z0-9-]+\.[a-z]{2,}(?:\/\S*)?)/i)||[])[1]||'';
    let name=rest.replace(phone,'').replace(url,'').replace(/\b(тел\.?|телефон|сайт|phone)\b/ig,'').replace(/[,;:]+/g,' ').trim();
    if(!name) name='Новый поставщик';
    const sup={ id:'s'+Date.now(), name, phone, addr:'', website:url.replace(/^https?:\/\//,''),
      price:null, currency:state.settings.currency, inStock:null, rating:null, reviews:0,
      distanceKm:null, why:'Добавлено вручную через чат', notes:'Добавлено вручную',
      sourceUrl:url?('https://'+url.replace(/^https?:\/\//,'')):'', source:url.replace(/^https?:\/\//,'') };
    t.suppliers.unshift(sup);
    return `Добавила в CRM: «${name}»${phone?`, тел. ${phone}`:''}${url?`, ${url}`:''}. Всего ${t.suppliers.length}.`;
  }
  const q=text.toLowerCase(); const acts=[];
  if(/налич|в наличии|есть на складе|сегодня/.test(q)){ t.filters.inStock=true; acts.push('оставила только тех, у кого товар в наличии'); }
  if(/достав/.test(q)){ t.filters.inStock=true; acts.push('приоритет — с доставкой/наличием'); }
  const mPrice=q.match(/(?:дешевл|до|меньше|не дороже|бюджет)\D{0,6}(\d+[.,]?\d*)/);
  if(mPrice){ const v=parseFloat(mPrice[1].replace(',','.')); t.filters.maxPrice=v; acts.push(`потолок цены ${v} ${state.settings.currency}`); }
  const mRat=q.match(/рейтинг\D{0,6}(\d[.,]?\d?)/);
  if(mRat){ const v=parseFloat(mRat[1].replace(',','.')); t.filters.minRating=v; acts.push(`рейтинг не ниже ${v}`); }
  const mDist=q.match(/(?:в радиусе|ближе|до|не дальше|в пределах)\D{0,6}(\d+)\s*км/);
  if(mDist){ const v=parseFloat(mDist[1]); t.filters.maxDist=v; acts.push(`не дальше ${v} км`); }
  if(/сброс|очист|сними фильтр/.test(q)){ t.filters={}; acts.length=0; acts.push('сбросила все фильтры'); }
  if(!acts.length){ return ''; }
  const count=t.suppliers.filter(s=>
    (!t.filters.inStock||s.inStock) &&
    (t.filters.maxPrice==null||(s.price!=null&&s.price<=t.filters.maxPrice)) &&
    (t.filters.minRating==null||(s.rating!=null&&s.rating>=t.filters.minRating)) &&
    (t.filters.maxDist==null||(s.distanceKm!=null&&s.distanceKm<=t.filters.maxDist))).length;
  return `Готово: ${acts.join(', ')}. Подходит ${count} из ${t.suppliers.length}.`;
}

  const t=findTask(taskId); const sup=t&&t.suppliers.find(s=>s.id===supId);

  if(confirm(`Открыть транскрипцию звонка с «${sup.name}»?\n\nВключи громкую связь на телефоне — браузер будет слушать и записывать текст. Аудио не сохраняется.`)){
    go(`call/${taskId}/${supId}`);
  }
}
let _callRecog = null;   // active SpeechRecognition for live transcription

function renderCall(taskId, supId){
  const t=findTask(taskId); const sup=t&&t.suppliers.find(s=>s.id===supId);
  if(!sup){ go('home'); return; }
  t.calls = t.calls || [];
  let call = t.calls.find(c=>c.supplierId===supId);
  if(!call){
    call={supplierId:supId, status:'live', transcript:[], createdAt:new Date().toISOString()};

  }
  setHeader(sup.name, sup.phone, 'task/'+taskId);
  const v=document.getElementById('view');

  function drawLog(){
    const log=document.getElementById('calllog'); if(!log) return;
    log.innerHTML = call.transcript.map(m=>`
      <div style="margin-bottom:8px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:2px">${m.t||''}</div>
        <div style="font-size:14px;line-height:1.5;background:var(--panel2);border-radius:10px;padding:8px 12px">${m.text}</div>
      </div>`).join('');

      <div class="card" style="margin-bottom:12px">
        <div class="row sb">
          <span class="${done?'':'rec listening'}"><span class="blob"></span>${done?'Транскрипция сохранена':'Слушаю…'}</span>
          <span class="muted" style="font-size:12px">${state.settings.callLang}</span>
        </div>
        ${noSR?`<div class="muted" style="font-size:12px;margin-top:6px">⚠️ Браузер не поддерживает распознавание речи — используй Chrome или Safari.</div>`:''}
        ${!done?`<div class="muted" style="font-size:12px;margin-top:6px">📱 Включи громкую связь на телефоне — браузер будет слушать и записывать текст.</div>`:''}
      </div>
      <div id="calllog" style="padding-bottom:120px"></div>
      <div id="interim" style="font-size:13px;color:var(--muted);padding:4px 12px;min-height:20px"></div>
      <div style="position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));left:0;right:0;max-width:560px;margin:0 auto;padding:12px 16px;background:var(--panel);border-top:1px solid var(--line)">
        ${done
          ? `<div class="row" style="gap:8px">
              <button class="btn" style="flex:1" onclick="go('task/${taskId}')">← К задаче</button>
              <button class="btn ghost" style="flex:none;padding:12px 14px" onclick="extractFromCall(findTask('${taskId}'),findTask('${taskId}').calls.find(c=>c.supplierId==='${supId}'),findTask('${taskId}').suppliers.find(s=>s.id==='${supId}'));saveState();go('task/${taskId}')">🤖 Извлечь данные</button>
            </div>`
          : `<button class="btn sec" style="width:100%" onclick="endCall('${taskId}','${supId}')">⏹ Завершить звонок</button>`
        }
      </div>`;
    drawLog();
    if(!done && !noSR) startTranscription(taskId, supId, call);
  }

  draw();
}

function startTranscription(taskId, supId, call){
  if(_callRecog){ try{ _callRecog.stop(); }catch(e){} _callRecog=null; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  const lang = SPEECH_LANG[state.settings.callLang] || SPEECH_LANG[state.settings.assistantLang] || 'pl-PL';
  const recog = new SR();
  recog.lang = lang;
  recog.continuous = true;
  recog.interimResults = true;
  recog.maxAlternatives = 1;
  _callRecog = recog;

  recog.onresult = e=>{
    const interim_el=document.getElementById('interim');
    let interim='';
    // commit any new final results
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        const txt=e.results[i][0].transcript.trim();
        if(txt){
          const now=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
          call.transcript.push({text:txt, t:now});
          saveState();
          const log=document.getElementById('calllog');
          if(log){
            const div=document.createElement('div');
            div.style.marginBottom='8px';
            div.innerHTML=`<div style="font-size:11px;color:var(--muted);margin-bottom:2px">${now}</div>
              <div style="font-size:14px;line-height:1.5;background:var(--panel2);border-radius:10px;padding:8px 12px">${txt}</div>`;
            log.appendChild(div);
            log.scrollTop=log.scrollHeight;
          }
        }
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if(interim_el) interim_el.textContent=interim;
  };

  recog.onerror = e=>{
    if(e.error==='no-speech') return;   // ignore silence gaps
    const interim_el=document.getElementById('interim');
    if(interim_el) interim_el.textContent='⚠️ '+e.error;
  };

  recog.onend = ()=>{
    // auto-restart if call still live and we're still on call screen
    if(parseHash().name==='call' && call.status==='live'){
      try{ recog.start(); }catch(e){}
    } else {
      _callRecog=null;
    }
  };

  try{ recog.start(); }catch(e){}
}

function endCall(taskId, supId){
  const t=findTask(taskId); const c=t.calls.find(x=>x.supplierId===supId);
  if(_callRecog){ try{ _callRecog.stop(); }catch(e){} _callRecog=null; }
  c.status='done';
  extractFromCall(t, c, t.suppliers.find(s=>s.id===supId));
  saveState();
  // re-render call screen to show done state
  renderCall(taskId, supId);
}

async function extractFromCall(t, call, sup){
  if(!call.transcript.length) return;
  // Try AI extraction of price/stock from transcript text
  const text = call.transcript.map(m=>m.text).join('\n');
  if(state.settings.openaiKey){
    try{
      const r=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.settings.openaiKey},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:200,
          messages:[{role:'user',content:
`Это транскрипция звонка поставщику. Извлеки данные.
Транскрипция:
${text}

Верни JSON: {"price": число или null, "currency": "PLN", "inStock": true/false/null, "summary": "1-2 предложения — что узнали"}
Только JSON.`}]})
      });
      const d=await r.json();
      if(r.ok){
        let obj; try{ obj=JSON.parse(d.choices[0].message.content); }catch{ obj=null; }
        if(obj){ call.extracted={...obj, confirmed:true}; saveState(); }
      }
    } catch(e){}
  }
}

/* ---------- call script (questions the AI asks each supplier) ---------- */
function buildCallScript(t){
  // Fallback static script — replaced by buildAiCallScript when key available
  const s = state.settings;
  const item = t.title.replace(/…$/,'');
  const lang = s.callLang||'Польский';
  const pl = lang==='Польский';
  return {
    _lang: lang,
    intro: pl
      ? `Dzień dobry! Jestem asystentem AI kupującego ${s.buyerName||''}. Szukamy ${item}. Czy mogę zadać kilka pytań?`
      : `Hello! I am an AI assistant for buyer ${s.buyerName||''}. We are looking for ${item}. May I ask a few questions?`,
    clarify: pl
      ? `Tak, jestem asystentem AI — pomagam ludziom zaoszczędzić czas na zbieraniu informacji przed zakupem. Decyzja o zakupie należy do samego kupującego.`
      : `Yes, I am an AI assistant — I help buyers save time gathering information. The purchase decision is made by the buyer.`,
    questions: pl ? [
      `Czy mają Państwo «${item}» na stanie? Jeśli tak — ile sztuk?`,
      `Jaka jest cena za sztukę i za całą potrzebną ilość?`,
      `Czy jest rabat przy większym zamówieniu?`,
      `Kiedy można odebrać lub kiedy jest dostawa?`,
      `Czy możliwa jest dostawa do ${s.city}, i ile kosztuje?`,
      `Jakie są metody płatności? Czy wymagana jest zaliczka?`,
      `Czy są alternatywy lub zamienniki, jeśli tej pozycji nie ma?`,
    ] : [
      `Is «${item}» in stock? If yes, how many units?`,
      `What is the price per unit and for the full quantity needed?`,
      `Is there a bulk discount?`,
      `When can it be picked up or delivered?`,
      `Is delivery to ${s.city} possible, and at what cost?`,
      `What payment methods are accepted? Is a deposit required?`,
      `Are there alternatives if this item is unavailable?`,
    ],
    closing: pl
      ? `Dziękuję bardzo! Przekażę informacje kupującemu i w razie potrzeby skontaktujemy się w sprawie zamówienia. Miłego dnia!`
      : `Thank you! I will pass this information to the buyer. Have a great day!`,
    negotiate: pl ? [
      `Mamy oferty od kilku dostawców — czy cena jest do negocjacji?`,
      `Przy płatności gotówką — czy jest możliwy rabat?`,
    ] : [],
  };
}
async function buildAiCallScript(t){
  const s=state.settings;
  if(!s.openaiKey) return buildCallScript(t);
  const lang=s.callLang||'Польский';
  const prices=t.suppliers.map(x=>x.price).filter(Boolean);
  const priceRange=prices.length?`${Math.min(...prices)}–${Math.max(...prices)} ${s.currency}`:'неизвестна';
  const res=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},
    body:JSON.stringify({model:'gpt-5.4-mini',max_tokens:700,
      messages:[{role:'user',content:
`Ты — помощник байера. Напиши деловой скрипт звонка поставщику на языке: ${lang}. Используй формальный деловой регистр, принятый в этом языке (в польском — Pan/Pani, в русском — Вы, и т.д.).
Задача покупателя: "${t.brief||t.title}"
Покупатель: ${s.buyerName||'покупатель'}, регион: ${s.city}.
Конкурентная цена на рынке: ${priceRange}.

Верни JSON без markdown:
{
  "intro": "приветствие на языке ${lang}, раскрытие что это ИИ-ассистент (EU AI Act), цель звонка",
  "clarify": "объяснение если продавец растерян — что такое ИИ-ассистент и зачем звонит (на языке ${lang})",
  "questions": ["вопрос 1 на языке ${lang}", "вопрос 2", ...7-9 конкретных вопросов по задаче],
  "negotiate": ["тактика торга 1 на языке ${lang} — конкретная фраза которую скажет ИИ", "тактика 2", "тактика 3"],
  "closing": "прощание на языке ${lang}"
}`}]
    })
  });
  const d=await res.json();
  if(!res.ok) return buildCallScript(t);
  try{
    const obj=JSON.parse(d.choices[0].message.content);
    return {...obj, _lang:lang, _ai:true};
  } catch{ return buildCallScript(t); }
}
function scriptToText(sc){
  return [sc.intro, '', ...sc.questions.map((q,i)=>`${i+1}. ${q}`), '', sc.closing].join('\n');
}
async function renderScript(id){
  const t = findTask(id);
  if(!t){ go('home'); return; }
  const s = state.settings;
  setHeader('Скрипт звонка', t.title, 'report/'+id);
  const v=document.getElementById('view');
  if(!t.callScript){
    v.innerHTML=`<div class="empty"><div class="ic">⏳</div><div>Генерирую скрипт на ${s.callLang.toLowerCase()}…</div></div>`;
    t.callScript = await buildAiCallScript(t);
    saveState();
  }
  const sc = t.callScript;
  const neg=(sc.negotiate||[]);
  v.innerHTML = `
    <div class="card" style="border-color:rgba(245,166,35,.4)">
      <div class="row sb" style="gap:8px">
        <div class="row" style="gap:8px"><span style="font-size:18px">🗣</span>
          <b>Язык: ${sc._lang||s.callLang}</b>${sc._ai?'<span class="tag" style="margin-left:6px">AI</span>':''}</div>
        <button class="btn ghost" style="margin:0;padding:6px 12px;width:auto;font-size:13px" onclick="resetScript('${id}')">🔄</button>
      </div>
      <div class="muted" style="margin-top:6px;font-size:13px">Первая фраза раскрывает что звонит ИИ (EU AI Act). Звонок по одному поставщику с подтверждением.</div>
    </div>

    <label>Приветствие (раскрытие ИИ)</label>
    <textarea id="sc-intro" style="min-height:90px">${sc.intro||''}</textarea>

    <label>Если продавец растерян</label>
    <textarea id="sc-clar" style="min-height:80px">${sc.clarify||''}</textarea>

    <label>Вопросы поставщику (по одному на строку)</label>
    <textarea id="sc-q" style="min-height:200px">${(sc.questions||[]).join('\n')}</textarea>

    ${neg.length?`<label>Фразы для торга</label>
    <textarea id="sc-neg" style="min-height:100px">${neg.join('\n')}</textarea>`:''}

    <label>Завершение</label>
    <textarea id="sc-out" style="min-height:80px">${sc.closing||''}</textarea>

    <button class="btn" onclick="saveScript('${id}')">Сохранить скрипт</button>
    <div class="demo-note">В фазе 2 этот текст передаётся агенту ElevenLabs как инструкция.</div>`;
}
function saveScript(id){
  const t = findTask(id); if(!t) return;
  const negEl=document.getElementById('sc-neg');
  t.callScript = {
    ...t.callScript,
    intro: val('sc-intro'),
    clarify: val('sc-clar'),
    questions: document.getElementById('sc-q').value.split('\n').map(x=>x.trim()).filter(Boolean),
    negotiate: negEl?negEl.value.split('\n').map(x=>x.trim()).filter(Boolean):[],
    closing: val('sc-out'),
  };
  saveState();
  go('task/'+id);
}
function resetScript(id){
  const t = findTask(id); if(!t) return;
  delete t.callScript; saveState(); renderScript(id);
}

router();
