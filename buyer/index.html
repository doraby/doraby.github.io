<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>Байер · AI-ассистент покупок</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a;
    --txt:#e8eaed; --muted:#9aa3b2; --accent:#5b8cff; --accent2:#3a6bff;
    --good:#2fbf71; --warn:#f5a623; --bad:#ff5c66; --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));}
  /* top bar */
  header{position:sticky;top:0;z-index:10;background:rgba(15,17,21,.85);backdrop-filter:blur(10px);
    padding:calc(12px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;}
  header h1{font-size:17px;margin:0;font-weight:650;flex:1}
  header .sub{color:var(--muted);font-size:12px}
  .back{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:6px 0}
  main{flex:1;padding:18px}
  /* bottom nav */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(23,26,33,.95);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);
    display:flex;max-width:560px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);}
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0 12px;
    font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .ic{font-size:20px;line-height:1}
  nav button.on{color:var(--accent)}
  /* generic */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px}
  .card.tap{cursor:pointer;transition:transform .08s,border-color .15s}
  .card.tap:active{transform:scale(.99)}
  .card.tap:hover{border-color:#39404e}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    margin:22px 2px 10px;font-weight:600}
  .muted{color:var(--muted)}
  .row{display:flex;align-items:center;gap:10px}
  .row.sb{justify-content:space-between}
  .tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;
    background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .tag.good{color:var(--good);border-color:rgba(47,191,113,.4)}
  .tag.warn{color:var(--warn);border-color:rgba(245,166,35,.4)}
  .tag.bad{color:var(--bad);border-color:rgba(255,92,102,.4)}
  .tag.accent{color:#cfe0ff;background:rgba(91,140,255,.12);border-color:rgba(91,140,255,.4)}
  label{display:block;font-size:13px;color:var(--muted);margin:14px 2px 6px}
  input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:12px;padding:12px 14px;font:inherit;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{min-height:120px;resize:vertical}
  .btn{display:block;width:100%;text-align:center;border:none;border-radius:14px;
    padding:15px;font:inherit;font-weight:650;cursor:pointer;margin-top:18px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff}
  .btn:active{opacity:.9}
  .btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.ghost{background:none;color:var(--accent);border:1px solid var(--line)}
  .price{font-size:20px;font-weight:700}
  .center{text-align:center}
  .hero{text-align:center;padding:48px 20px 24px}
  .hero .logo{font-size:54px}
  .hero h1{font-size:24px;margin:14px 0 6px}
  .hero p{color:var(--muted);margin:0 auto;max-width:340px}
  .pill{display:inline-flex;gap:6px;align-items:center;background:var(--panel2);
    border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted)}
  .step{display:flex;gap:14px;margin-bottom:18px}
  .step .dot{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;
    justify-content:center;font-size:13px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .step.done .dot{background:var(--good);border-color:var(--good);color:#06210f}
  .step.active .dot{background:var(--accent);border-color:var(--accent);color:#fff;
    animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(91,140,255,.5)}50%{box-shadow:0 0 0 7px rgba(91,140,255,0)}}
  .step .t{font-weight:600}
  .step .d{color:var(--muted);font-size:13px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .ic{font-size:40px;opacity:.6}
  .seg{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:4px;margin-bottom:8px}
  .seg button{flex:1;background:none;border:none;color:var(--muted);padding:8px;border-radius:9px;
    cursor:pointer;font:inherit;font-size:13px}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}
  .rankbadge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;background:var(--panel2);border:1px solid var(--line);flex:none}
  .rankbadge.g1{background:linear-gradient(180deg,#ffd66b,#e6a800);color:#3a2a00;border:none}
  .demo-note{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;opacity:.7}
  /* CRM table */
  .tblwrap{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
  .tblscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.crm{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
  table.crm th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-weight:600;
    text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;
    cursor:pointer;user-select:none;font-size:12px}
  table.crm th.sorted{color:var(--accent)}
  table.crm th .ar{font-size:10px;opacity:.8}
  table.crm td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  table.crm tr:last-child td{border-bottom:none}
  table.crm tr.row1 td{background:rgba(91,140,255,.06)}
  table.crm .nm{font-weight:600;color:var(--txt)}
  table.crm .ad{color:var(--muted);font-size:11px;margin-top:2px;white-space:normal}
  table.crm .pr{font-weight:700;white-space:nowrap}
  table.crm a.tel{color:var(--accent);text-decoration:none;white-space:nowrap}
  table.crm .dot-s{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
  .dot-s.in{background:var(--good)} .dot-s.out{background:var(--bad)}
  a{color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <main id="view"></main>
  <nav id="nav"></nav>
</div>

<script>
/* ============================================================
   Buyer Assistant — M0 skeleton (mock data, no backend yet)
   Single-file PWA. Hash router. State in memory + localStorage.
   ============================================================ */

const LS = 'buyer.state.v1';
const state = loadState();

function loadState(){
  const def = {
    settings:{ country:'Польша', city:'Краков', assistantLang:'Русский',
               callLang:'Польский', currency:'PLN' },
    tasks: seedTasks()
  };
  try{ const s = JSON.parse(localStorage.getItem(LS)); return s ? {...def, ...s} : def; }
  catch(e){ return def; }
}
function saveState(){ localStorage.setItem(LS, JSON.stringify(state)); }

function seedTasks(){
  return [{
    id:'t1', title:'Гипсокартон Knauf 12.5мм, 40 листов',
    brief:'Нужен влагостойкий гипсокартон Knauf 12.5мм, ~40 листов, с доставкой в Краков на этой неделе. Интересует цена за лист и наличие на складе.',
    status:'reported', createdAt:'2026-05-30',
    suppliers:[
      {id:'s1',name:'BudMax Hurt',phone:'+48 12 345 67 01',addr:'ul. Wielicka 250, Kraków',
       website:'budmax.pl',price:38.9,currency:'PLN',inStock:true,rating:4.6,reviews:212,
       source:'budmax.pl',notes:'Доставка 1-2 дня, от 50 листов скидка 8%'},
      {id:'s2',name:'Castorama Kraków',phone:'+48 12 296 30 00',addr:'al. Pokoju 67, Kraków',
       website:'castorama.pl',price:42.5,currency:'PLN',inStock:true,rating:4.3,reviews:1840,
       source:'castorama.pl',notes:'В наличии, самовывоз сегодня'},
      {id:'s3',name:'Hurtownia BudoStal',phone:'+48 12 411 22 33',addr:'ul. Nowohucka 92, Kraków',
       website:'budostal.pl',price:36.5,currency:'PLN',inStock:false,rating:4.1,reviews:67,
       source:'budostal.pl',notes:'Под заказ, поставка ~5 дней'},
    ],
    report:{
      summary:'Нашла 3 поставщика в Кракове. Лучшее сочетание цены и наличия — BudMax Hurt: 38.9 PLN/лист, есть на складе, доставка 1–2 дня, скидка 8% от 50 листов. BudoStal дешевле (36.5), но нет в наличии (~5 дней). Castorama — дороже, но самовывоз сегодня.',
      ranking:['s1','s3','s2']
    }
  }];
}

/* ---------- router ---------- */
const routes = {
  '': renderHome, 'home': renderHome,
  'new': renderNew, 'settings': renderSettings,
  'task': renderTask, 'research': renderResearch,
  'crm': renderCRM, 'report': renderReport,
};
function go(hash){ location.hash = hash; }
function parseHash(){
  const raw = location.hash.replace(/^#\/?/, '');
  const [name, arg] = raw.split('/');
  return { name: name||'', arg };
}
function router(){
  const {name, arg} = parseHash();
  const fn = routes[name] || renderHome;
  document.getElementById('view').scrollTop = 0;
  fn(arg);
  renderNav(name);
}
window.addEventListener('hashchange', router);

/* ---------- chrome ---------- */
function setHeader(title, sub, back){
  const h = document.getElementById('hdr');
  h.innerHTML = `
    ${back ? `<button class="back" onclick="go('${back}')">‹ Назад</button>`:''}
    <div style="flex:1">
      <h1>${title}</h1>
      ${sub?`<div class="sub">${sub}</div>`:''}
    </div>`;
}
function renderNav(active){
  const items = [
    ['home','🏠','Задачи'],
    ['new','➕','Новая'],
    ['settings','⚙️','Настройки'],
  ];
  document.getElementById('nav').innerHTML = items.map(([r,ic,l])=>
    `<button class="${active===r||(r==='home'&&active==='')?'on':''}" onclick="go('${r}')">
       <span class="ic">${ic}</span><span>${l}</span></button>`).join('');
}

/* ---------- screens ---------- */
function renderHome(){
  setHeader('Байер', `${state.settings.city}, ${state.settings.country}`);
  const v = document.getElementById('view');
  if(!state.tasks.length){
    v.innerHTML = `
      <div class="hero">
        <div class="logo">🛒</div>
        <h1>AI-ассистент покупок</h1>
        <p>Поставь задачу — я найду поставщиков, цены и отзывы в твоём регионе и подготовлю отчёт, где выгоднее купить.</p>
      </div>
      <button class="btn" onclick="go('new')">Поставить задачу</button>`;
    return;
  }
  v.innerHTML = `
    <button class="btn" onclick="go('new')">➕ Новая задача</button>
    <h2>Мои задачи</h2>
    ${state.tasks.map(taskCard).join('')}`;
}
function statusTag(st){
  const map = {
    draft:['','Черновик'], researching:['warn','Ищу…'],
    researched:['accent','Найдено'], reported:['good','Готов отчёт'],
    calling:['warn','Звоню…'], done:['good','Готово']
  };
  const [c,l] = map[st]||['','—'];
  return `<span class="tag ${c}">${l}</span>`;
}
function taskCard(t){
  return `<div class="card tap" onclick="go('task/${t.id}')">
    <div class="row sb"><div style="font-weight:600">${t.title}</div>${statusTag(t.status)}</div>
    <div class="muted" style="margin-top:6px;font-size:13px">${t.suppliers?.length||0} поставщиков · ${t.createdAt}</div>
  </div>`;
}

function renderNew(){
  setHeader('Новая задача', 'Что нужно купить?', 'home');
  document.getElementById('view').innerHTML = `
    <label>Опиши задачу</label>
    <textarea id="brief" placeholder="Напр.: Нужен влагостойкий гипсокартон Knauf 12.5мм, 40 листов, с доставкой в Краков на этой неделе. Узнать цену за лист и наличие."></textarea>
    <div class="row" style="gap:8px;margin-top:12px;flex-wrap:wrap">
      <span class="pill">📍 ${state.settings.city}</span>
      <span class="pill">🗣 задача: ${state.settings.assistantLang}</span>
      <span class="pill">📞 звонки: ${state.settings.callLang}</span>
    </div>
    <button class="btn" onclick="createTask()">Запустить ресёрч →</button>
    <button class="btn ghost" onclick="go('settings')">Изменить регион / язык</button>
    <div class="demo-note">M0 · демо-данные. Реальный ресёрч подключается на этапе M2.</div>`;
}
function createTask(){
  const brief = document.getElementById('brief').value.trim();
  if(!brief){ alert('Опиши, что нужно купить'); return; }
  const id = 't'+Date.now();
  const title = brief.length>48 ? brief.slice(0,48)+'…' : brief;
  state.tasks.unshift({ id, title, brief, status:'researching',
    createdAt:new Date().toISOString().slice(0,10), suppliers:[], report:null });
  saveState();
  go('research/'+id);
}

function findTask(id){ return state.tasks.find(t=>t.id===id); }

function renderTask(id){
  const t = findTask(id);
  if(!t){ go('home'); return; }
  setHeader(t.title, statusLabel(t.status), 'home');
  document.getElementById('view').innerHTML = `
    <div class="card"><div class="muted" style="font-size:13px">Задача</div>
      <div style="margin-top:6px">${t.brief}</div></div>
    <h2>Дальше</h2>
    ${t.status==='researching'
      ? `<button class="btn" onclick="go('research/${t.id}')">Смотреть ресёрч</button>`
      : `<div class="card tap" onclick="go('crm/${t.id}')">
           <div class="row sb"><b>📇 CRM поставщиков</b><span class="muted">${t.suppliers.length} →</span></div></div>
         <div class="card tap" onclick="go('report/${t.id}')">
           <div class="row sb"><b>📊 Отчёт</b><span class="muted">${t.report?'готов →':'—'}</span></div></div>`}
  `;
}
function statusLabel(st){return {draft:'Черновик',researching:'Идёт ресёрч',researched:'Ресёрч завершён',reported:'Отчёт готов',calling:'Идёт обзвон',done:'Готово'}[st]||'';}

function renderResearch(id){
  const t = findTask(id);
  if(!t){ go('home'); return; }
  setHeader('Ресёрч', t.title, 'home');
  const steps = [
    ['Разбираю задачу','Определяю товар, объём и параметры'],
    ['Ищу поставщиков',`Сканирую магазины и каталоги · ${state.settings.city}`],
    ['Собираю цены и отзывы','Цена, наличие, рейтинг по каждому'],
    ['Готовлю CRM','Складываю карточки поставщиков'],
  ];
  let cur = 0;
  const v = document.getElementById('view');
  function draw(){
    v.innerHTML = `<div class="card">${steps.map((s,i)=>`
      <div class="step ${i<cur?'done':i===cur?'active':''}">
        <div class="dot">${i<cur?'✓':i+1}</div>
        <div><div class="t">${s[0]}</div><div class="d">${s[1]}</div></div>
      </div>`).join('')}</div>
      ${cur>=steps.length?`<button class="btn" onclick="go('crm/${t.id}')">Открыть CRM →</button>`:
        `<div class="center muted">Это демо M0 — имитация прогресса</div>`}`;
  }
  draw();
  // simulate progress only for freshly-created (empty) tasks
  if(t.status==='researching'){
    const iv = setInterval(()=>{
      cur++;
      if(cur>=steps.length){
        clearInterval(iv);
        if(!t.suppliers.length){ t.suppliers = seedTasks()[0].suppliers; t.report = seedTasks()[0].report; }
        t.status='reported'; saveState();
      }
      if(parseHash().name==='research'){ draw(); } else { clearInterval(iv); }
    }, 900);
  } else { cur = steps.length; draw(); }
}

function renderCRM(id){
  const t = findTask(id);
  if(!t){ go('home'); return; }
  setHeader('CRM поставщиков', `${t.title} · ${t.suppliers.length} шт.`, 'task/'+id);
  const v = document.getElementById('view');
  let sort = 'price', dir = 1;            // dir: 1 asc, -1 desc
  const cols = [
    ['name','Поставщик'], ['price','Цена'], ['stock','Наличие'],
    ['rating','Рейтинг'], ['phone','Телефон']
  ];
  const cmp = {
    name:(a,b)=>a.name.localeCompare(b.name),
    price:(a,b)=>a.price-b.price,
    stock:(a,b)=>(b.inStock-a.inStock),
    rating:(a,b)=>(b.rating-a.rating),
    phone:(a,b)=>a.name.localeCompare(b.name),
  };
  function draw(){
    const list = [...t.suppliers].sort((a,b)=>cmp[sort](a,b)*dir);
    v.innerHTML = `
      <div class="tblwrap"><div class="tblscroll"><table class="crm">
        <thead><tr>${cols.map(([k,l])=>
          `<th data-k="${k}" class="${sort===k?'sorted':''}">${l}${
            sort===k?` <span class="ar">${dir>0?'▲':'▼'}</span>`:''}</th>`).join('')}</tr></thead>
        <tbody>${list.map((s,i)=>rowHTML(s,i)).join('')}</tbody>
      </table></div></div>
      <div class="demo-note">Нажми на заголовок столбца для сортировки</div>
      <button class="btn ghost" onclick="go('report/${id}')">📊 К отчёту</button>`;
    v.querySelectorAll('th').forEach(th=>th.onclick=()=>{
      const k=th.dataset.k;
      if(sort===k){ dir=-dir; } else { sort=k; dir = (k==='name'||k==='phone')?1:(k==='price'?1:-1); }
      draw();
    });
  }
  draw();
}
function stars(r){return '★'.repeat(Math.round(r))+'☆'.repeat(5-Math.round(r));}
function rowHTML(s,i){
  return `<tr class="${i===0?'row1':''}">
    <td><div class="nm">${s.name}</div><div class="ad">📍 ${s.addr}</div></td>
    <td class="pr">${s.price} ${s.currency}</td>
    <td><span class="dot-s ${s.inStock?'in':'out'}"></span>${s.inStock?'есть':'под заказ'}</td>
    <td>${s.rating} <span class="muted" style="font-size:11px">(${s.reviews})</span></td>
    <td><a class="tel" href="tel:${s.phone.replace(/\s/g,'')}">${s.phone}</a></td>
  </tr>`;
}

function renderReport(id){
  const t = findTask(id);
  if(!t || !t.report){ go('task/'+id); return; }
  setHeader('Отчёт', t.title, 'task/'+id);
  const byId = Object.fromEntries(t.suppliers.map(s=>[s.id,s]));
  const ranked = t.report.ranking.map(sid=>byId[sid]).filter(Boolean);
  document.getElementById('view').innerHTML = `
    <div class="card"><div class="row" style="gap:8px"><span style="font-size:20px">💡</span>
      <b>Рекомендация</b></div>
      <div style="margin-top:10px">${t.report.summary}</div></div>
    <h2>Рейтинг поставщиков</h2>
    ${ranked.map((s,i)=>`
      <div class="card">
        <div class="row" style="gap:12px">
          <div class="rankbadge ${i===0?'g1':''}">${i+1}</div>
          <div style="flex:1"><div style="font-weight:650">${s.name}</div>
            <div class="muted" style="font-size:13px">${s.inStock?'в наличии':'под заказ'} · ${stars(s.rating)} ${s.rating}</div></div>
          <div class="price">${s.price} ${s.currency}</div>
        </div>
        <a class="btn sec" style="text-decoration:none" href="tel:${s.phone.replace(/\s/g,'')}">📞 Позвонить · ${s.phone}</a>
      </div>`).join('')}
    <div class="card" style="border-style:dashed">
      <div class="row" style="gap:8px"><span style="font-size:18px">📞</span><b>Звонок ассистента</b>
        <span class="tag">фаза 2</span></div>
      <div class="muted" style="margin-top:8px;font-size:13px">Звоним <b>по одному с подтверждением</b> — не массовый обзвон. По каждому поставщику жмёшь «Позвонить (ИИ)», ассистент звонит на ${state.settings.callLang.toLowerCase()} языке, представляется как ИИ и уточняет цену, наличие и сроки.</div>
      <button class="btn" disabled style="opacity:.5;margin-top:12px">📞 Позвонить (ИИ) — по одному</button>
    </div>`;
}

function renderSettings(){
  setHeader('Настройки', 'Регион и языки');
  const s = state.settings;
  const langs = ['Русский','Английский','Польский','Украинский','Немецкий','Испанский'];
  const curr = ['PLN','EUR','USD','UAH','RUB','GBP'];
  document.getElementById('view').innerHTML = `
    <label>Страна</label><input id="country" value="${s.country}">
    <label>Город</label><input id="city" value="${s.city}">
    <label>Язык общения с ассистентом</label>
    <select id="aLang">${langs.map(l=>`<option ${l===s.assistantLang?'selected':''}>${l}</option>`).join('')}</select>
    <label>Язык звонков поставщикам</label>
    <select id="cLang">${langs.map(l=>`<option ${l===s.callLang?'selected':''}>${l}</option>`).join('')}</select>
    <label>Валюта</label>
    <select id="curr">${curr.map(c=>`<option ${c===s.currency?'selected':''}>${c}</option>`).join('')}</select>
    <button class="btn" onclick="saveSettings()">Сохранить</button>`;
}
function saveSettings(){
  state.settings = {
    country:val('country'), city:val('city'),
    assistantLang:val('aLang'), callLang:val('cLang'), currency:val('curr')
  };
  saveState(); go('home');
}
function val(id){return document.getElementById(id).value.trim();}

/* boot */
router();
if('serviceWorker' in navigator){ /* sw added in later milestone */ }
</script>
</body>
</html>
